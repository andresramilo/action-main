name: "Teste de Action with JS"
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]
jobs:
  teste-action-job:
    permissions:
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    name: Execução da Custom Action
    steps:
      - name: Adicionando comentário
        id: comment_step
        uses: andresramilo/action-js@main
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          issue-id: ${{ github.event.issue.number }}
          comment: "Teste de comentário"
      - name: Mostrar o ID do comentário
        run: |
          echo "ID do comentário é: ${{ steps.comment_step.outputs.comment-id }}"
